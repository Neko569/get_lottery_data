name: 彩票开奖数据定时获取

on:
  push:
    branches:
      - main
    # 忽略 data/ 目录变更，避免 workflow 自身提交数据后触发死循环
    paths-ignore:
      - 'data/**'
      - '.github/**'
      - 'README.md'
  workflow_dispatch:
    inputs:
      lottery:
        description: '获取哪个彩种'
        type: choice
        options:
          - all
          - ssq
          - daletou
          - qxc
          - pls
          - plw
          - fc3d
          - qlc
          - kl8
        default: all
      mode:
        description: '获取模式'
        type: choice
        options:
          - update
          - history
        default: update

jobs:
  fetch-lottery:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 设置北京时间时区
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          timedatectl

      - name: 记录实际执行时间（北京时间）
        run: |
          echo "UTC 时间: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "北京时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"

      - name: 执行调度脚本
        env:
          # workflow_dispatch 手动触发时使用传入参数；schedule/push 触发时为空，scheduler 内部默认 all/update
          LOTTERY: ${{ github.event.inputs.lottery }}
          FETCH_MODE: ${{ github.event.inputs.mode }}
        run: python scripts/scheduler.py

      - name: 提交数据变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "数据无变更，跳过提交"
          else
            # 提取本次更新的彩种与期号摘要，附在 commit message 中
            SUMMARY=$(python -c "
          import json, os

          NAME_MAP = {
              'ssq_history.json':  '双色球',
              'dlt_history.json':  '大乐透',
              'qxc_history.json':  '七星彩',
              'pls_history.json':  '排列三',
              'plw_history.json':  '排列五',
              'fc3d_history.json': '福彩3D',
              'qlc_history.json':  '七乐彩',
              'kl8_history.json':  '快乐八',
          }

          parts = []
          for fname, label in NAME_MAP.items():
              p = os.path.join('data', fname)
              if os.path.exists(p):
                  try:
                      d = json.load(open(p, encoding='utf-8'))
                      items = d.get('items', [])
                      if items:
                          parts.append(f'{label}{items[0].get(\"term\")}')
                  except Exception:
                      pass
          print('、'.join(parts) if parts else '数据')
          ")
            git commit -m "chore: 更新彩票开奖数据 ($SUMMARY $(date '+%Y-%m-%d %H:%M:%S'))"
            git push
          fi
