name: 彩票开奖数据定时获取

on:
  schedule:
    # UTC 14:30 = 北京时间 22:30
    - cron: '30 14 * * *'
  push:
    branches:
      - main
    # 忽略 data/ 目录变更，避免 workflow 自身提交数据后触发死循环
    paths-ignore:
      - 'data/**'
      - '.github/**'
      - 'README.md'
  workflow_dispatch:
    inputs:
      lottery:
        description: '获取哪个彩种'
        type: choice
        options:
          - both
          - ssq
          - daletou
        default: both
      mode:
        description: '获取模式'
        type: choice
        options:
          - update
          - history
        default: update

jobs:
  fetch-lottery:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 设置北京时间时区
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          timedatectl

      - name: 执行调度脚本
        env:
          # workflow_dispatch 手动触发时使用传入参数；schedule/push 触发时为空，scheduler 内部默认 both/update
          LOTTERY: ${{ github.event.inputs.lottery }}
          FETCH_MODE: ${{ github.event.inputs.mode }}
        run: python scripts/scheduler.py

      - name: 提交数据变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "数据无变更，跳过提交"
          else
            git commit -m "chore: 更新彩票开奖数据 ($(date '+%Y-%m-%d %H:%M:%S' %Z))"
            git push
          fi
